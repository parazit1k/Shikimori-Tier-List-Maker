<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikimori Tier List Maker</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --container-bg: #333333;
            --text-color: #ffffff;
            --pool-bg: #2a2a2a;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
        }

        button, .file-upload-btn, select, input[type="text"] {
            background-color: #444;
            color: white;
            border: 1px solid #666;
            padding: 9px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            transition: background-color 0.2s;
            display: inline-block;
            text-align: center;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        button {
            background-color: #4CAF50;
            border: none;
        }

        button:hover, .file-upload-btn:hover {
            background-color: #45a049;
        }

        button.danger {
            background-color: #f44336;
        }

        button.danger:hover {
            background-color: #d32f2f;
        }

        button.secondary {
            background-color: #2196F3;
        }
        
        button.secondary:hover {
            background-color: #1976D2;
        }

        select:hover, input[type="text"]:focus {
            background-color: #555;
            border-color: #888;
        }

        input[type="text"] {
            cursor: text;
            width: 160px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-group label {
            font-size: 13px;
            color: #ccc;
        }

        .main-content {
            display: flex;
            flex-direction: column; 
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .main-content.side-mode {
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
        }

        .tier-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: #111;
            border: 2px solid #000;
        }

        .main-content.side-mode .tier-list {
            width: 68%;
            flex-shrink: 0;
        }

        .tier-row {
            display: flex;
            min-height: 120px;
            border-bottom: 2px solid #000;
        }
        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            border-right: 2px solid #000;
            flex-shrink: 0;
        }

        .tier-s { background-color: #ff7f7f; }
        .tier-a { background-color: #ffbf7f; }
        .tier-b { background-color: #ffff7f; }
        .tier-c { background-color: #ffffbf; }
        .tier-d { background-color: #bfff7f; }

        .dropzone {
            flex-grow: 1;
            background-color: var(--container-bg);
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 10px;
            gap: 8px;
            min-height: 120px;
        }

        .pool-container {
            width: 100%;
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        .main-content.side-mode .pool-container {
            width: 30%;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }

        .main-content.side-mode #pool {
            overflow-y: auto;
            flex-grow: 1;
        }

        .pool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pool-container h3 {
            margin: 0;
            font-size: 18px;
        }

        #pool {
            background-color: var(--pool-bg);
            border: 2px dashed #666;
            min-height: 150px;
            padding: 10px;
            gap: 8px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .anime-item {
            background-color: #444; 
            border: 1px solid #222;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            flex: 1 1 75px;
            max-width: 85px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            position: relative;
        }

        .anime-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; 
        }

        .anime-item:active {
            cursor: grabbing;
        }

        .anime-item.dragging {
            opacity: 0.5;
            box-shadow: 0 8px 12px rgba(0,0,0,0.5);
            transform: scale(1.05);
        }

        .loader-text {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #aaa;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="file-upload-wrapper">
            <div class="file-upload-btn" id="fileBtnText" data-i18n="uploadBtn">Обзор</div>
            <input type="file" id="fileInput" accept=".json">
        </div>
        <button id="exportBtn" data-i18n="export">Выгрузить JSON</button>
        <button id="resetBtn" class="danger" data-i18n="reset">Очистить</button>
        <button id="layoutBtn" class="secondary" data-i18n="layout">Сменить вид</button>

        <div class="filter-group">
            <label for="genreFilter" data-i18n="genreLabel">Жанр / Тема:</label>
            <select id="genreFilter">
                <option value="all" data-i18n="allGenres">Все</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="langSelect">Язык:</label>
            <select id="langSelect">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        
        <div class="tier-list">
            <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div class="dropzone" data-tier="S"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div class="dropzone" data-tier="A"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div class="dropzone" data-tier="B"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div class="dropzone" data-tier="C"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-d">D</div>
                <div class="dropzone" data-tier="D"></div>
            </div>
        </div>

        <div class="pool-container">
            <div class="pool-header">
                <h3 data-i18n="poolTitle">Неоценённые</h3>
                <div class="filter-group">
                    <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Название...">
                </div>
            </div>
            <div id="pool" class="dropzone" data-tier="POOL"></div>
        </div>

    </div>

    <script>
        let globalAnimeData = [];
        let currentLang = 'ru'; 
        let rawMetadataMap = {}; 

        const i18n = {
            ru: {
                uploadBtn: "Обзор",
                export: "Выгрузить JSON",
                reset: "Очистить",
                layout: "Сменить вид",
                searchLabel: "Поиск:",
                searchPlaceholder: "Название...",
                genreLabel: "Жанр / Тема:",
                allGenres: "Все",
                poolTitle: "Неоценённые",
                fileError: "Ошибка при чтении JSON файла!",
                noFileError: "Сначала загрузите JSON файл!"
            },
            en: {
                uploadBtn: "Browse File",
                export: "Export JSON",
                reset: "Reset",
                layout: "Change Layout",
                searchLabel: "Search:",
                searchPlaceholder: "Title...",
                genreLabel: "Genre / Theme:",
                allGenres: "All",
                poolTitle: "Unrated",
                fileError: "Error reading JSON file!",
                noFileError: "Please upload a JSON file first!"
            }
        };

        function updateTexts() {
            const t = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateTexts();
            rebuildGenreDropdown();
        });

        const scoreMapping = {
            'S': 10,
            'A': 9,
            'B': 8,
            'C': 7,
            'D': 6
        };

        document.getElementById('layoutBtn').addEventListener('click', () => {
            document.getElementById('mainContent').classList.toggle('side-mode');
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileBtnText').textContent = file.name.length > 15 ? file.name.slice(0, 12) + '...' : file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    globalAnimeData = JSON.parse(event.target.result);
                    renderPool();
                } catch (error) {
                    alert(i18n[currentLang].fileError);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        });

        async function fetchMetadataForAnimes(animes, onProgress) {
            const rawMap = {};
            const uncachedAnimes = [];
            let loadedCount = 0;
            const totalToFetch = animes.length;

            for (const anime of animes) {
                const id = anime.target_id;
                const cached = localStorage.getItem(`shikimori_meta_${id}`);
                if (cached) {
                    rawMap[id] = JSON.parse(cached);
                    loadedCount++;
                } else {
                    uncachedAnimes.push(anime);
                }
            }

            if (onProgress) onProgress(loadedCount, totalToFetch);

            const fetchSingle = async (anime) => {
                const id = anime.target_id;
                let attempts = 0;
                
                while (attempts < 5) {
                    try {
                        const response = await fetch(`https://shikimori.io/api/animes/${id}`, {
                            headers: { 'User-Agent': 'TierListApp' }
                        });
                        
                        if (response.status === 429) {
                            attempts++;
                            await new Promise(r => setTimeout(r, attempts * 1500));
                            continue;
                        }

                        if (response.ok) {
                            const data = await response.json();
                            const result = {
                                genres: data.genres || [],
                                themes: data.themes || []
                            };
                            rawMap[id] = result;
                            localStorage.setItem(`shikimori_meta_${id}`, JSON.stringify(result));
                        }
                        break;
                    } catch (err) {
                        attempts++;
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }

                loadedCount++;
                if (onProgress) onProgress(loadedCount, totalToFetch);
            };

            const batchSize = 4;
            for (let i = 0; i < uncachedAnimes.length; i += batchSize) {
                const batch = uncachedAnimes.slice(i, i + batchSize);
                await Promise.all(batch.map(anime => fetchSingle(anime)));
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            return rawMap;
        }

        function rebuildGenreDropdown() {
            const genreFilter = document.getElementById('genreFilter');
            const selectedVal = genreFilter.value;
            
            const allTagsSet = new Set();
            Object.values(rawMetadataMap).forEach(item => {
                [...item.genres, ...item.themes].forEach(tagObj => {
                    const val = currentLang === 'ru' 
                        ? (tagObj.russian || tagObj.name) 
                        : (tagObj.name || tagObj.russian);
                    if (val) allTagsSet.add(val.toLowerCase().trim());
                });
            });

            genreFilter.innerHTML = `<option value="all">${i18n[currentLang].allGenres}</option>`;
            Array.from(allTagsSet).sort().forEach(tag => {
                const opt = document.createElement('option');
                opt.value = tag;
                opt.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
                genreFilter.appendChild(opt);
            });

            if ([...genreFilter.options].some(o => o.value === selectedVal)) {
                genreFilter.value = selectedVal;
            } else {
                genreFilter.value = 'all';
            }
            applyFilters();
        }

        async function renderPool() {
            const pool = document.getElementById('pool');
            
            const getLoaderText = (current, total) => {
                if (currentLang === 'ru') {
                    return `Загружаем информацию по аниме с Шикимори... (${current} / ${total})`;
                } else {
                    return `Loading anime info from Shikimori... (${current} / ${total})`;
                }
            };

            pool.innerHTML = `<div class="loader-text">${getLoaderText(0, 0)}</div>`; 
            document.querySelectorAll('.tier-list .dropzone').forEach(dz => dz.innerHTML = '');

            const completedAnimes = globalAnimeData.filter(a => a.status === 'completed');
            
            rawMetadataMap = await fetchMetadataForAnimes(completedAnimes, (current, total) => {
                pool.innerHTML = `<div class="loader-text">${getLoaderText(current, total)}</div>`;
            });

            rebuildGenreDropdown();
            pool.innerHTML = ''; 

            completedAnimes.forEach(anime => {
                const el = document.createElement('div');
                el.className = 'anime-item';
                el.draggable = true;
                el.id = `anime-${anime.target_id}`;
                el.dataset.id = anime.target_id;
                
                const rawObj = rawMetadataMap[anime.target_id] || { genres: [], themes: [] };
                const ruTags = [...rawObj.genres, ...rawObj.themes].map(t => (t.russian || t.name || '').toLowerCase().trim());
                const enTags = [...rawObj.genres, ...rawObj.themes].map(t => (t.name || t.russian || '').toLowerCase().trim());

                el.dataset.tagsRu = ruTags.join(',');
                el.dataset.tagsEn = enTags.join(',');
                
                const titleRu = anime.target_title_ru || '';
                const titleEn = anime.target_title || '';
                el.dataset.titleRu = titleRu.toLowerCase();
                el.dataset.titleEn = titleEn.toLowerCase();
                
                const title = titleRu || titleEn;
                el.title = title;
                
                const img = document.createElement('img');
                const imgBaseUrl = `https://shikimori.io/system/animes/original/${anime.target_id}`;
                img.src = `${imgBaseUrl}.jpg`;
                img.alt = title;

                img.onerror = function() {
                    if (this.src.includes('.jpg')) {
                        this.src = `${imgBaseUrl}.jpeg`;
                    } else {
                        this.remove();
                        el.style.padding = "5px";
                        el.textContent = title;
                    }
                };

                el.appendChild(img);
                
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                
                pool.appendChild(el);
            });

            applyFilters();
        }

        function applyFilters() {
            const selectedGenre = document.getElementById('genreFilter').value;
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();

            document.querySelectorAll('.anime-item').forEach(item => {
                const tagsStr = currentLang === 'ru' ? item.dataset.tagsRu : item.dataset.tagsEn;
                const tags = tagsStr ? tagsStr.split(',') : [];
                const titleRu = item.dataset.titleRu || '';
                const titleEn = item.dataset.titleEn || '';

                const matchesGenre = (selectedGenre === 'all' || tags.includes(selectedGenre));
                const matchesSearch = (searchQuery === '' || titleRu.includes(searchQuery) || titleEn.includes(searchQuery));

                if (matchesGenre && matchesSearch) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        document.getElementById('genreFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        document.getElementById('resetBtn').addEventListener('click', () => {
            const pool = document.getElementById('pool');
            document.querySelectorAll('.tier-list .anime-item').forEach(item => {
                pool.appendChild(item);
            });
            applyFilters();
        });

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.id);
            setTimeout(() => e.target.classList.add('dragging'), 0);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function getDragAfterElement(container, x, y) {
            const draggableElements = [...container.querySelectorAll('.anime-item:not(.dragging)')];
            for (const child of draggableElements) {
                const box = child.getBoundingClientRect();
                if (y >= box.top && y <= box.bottom) {
                    if (x < box.left + box.width / 2) {
                        return child;
                    }
                } else if (y < box.top) {
                    return child;
                }
            }
            return null;
        }

        document.querySelectorAll('.dropzone').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); 
                
                const draggingItem = document.querySelector('.dragging');
                if (!draggingItem) return;

                const afterElement = getDragAfterElement(zone, e.clientX, e.clientY);
                if (afterElement == null) {
                    zone.appendChild(draggingItem);
                } else {
                    zone.insertBefore(draggingItem, afterElement);
                }
            });
            zone.addEventListener('drop', (e) => e.preventDefault());
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (globalAnimeData.length === 0) {
                alert(i18n[currentLang].noFileError);
                return;
            }

            const updatedData = JSON.parse(JSON.stringify(globalAnimeData));

            Object.keys(scoreMapping).forEach(tier => {
                const zone = document.querySelector(`.dropzone[data-tier="${tier}"]`);
                const items = zone.querySelectorAll('.anime-item');
                
                items.forEach(item => {
                    const targetId = parseInt(item.dataset.id, 10);
                    const animeRecord = updatedData.find(a => a.target_id === targetId);
                    if (animeRecord) {
                        animeRecord.score = scoreMapping[tier];
                    }
                });
            });

            const dataStr = JSON.stringify(updatedData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'updated_tierlist.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        updateTexts();
    </script>
</body>
</html>
